- name: Set up Postgres
  hosts: all
  become: true

  tasks:
    - name: Install PostgreSQL
      ansible.builtin.apt:
        name: postgresql
        state: present

    - name: Ensure postgresql service is enabled
      ansible.builtin.service:
        name: postgresql
        enabled: true

    - name: Ensure postgresql service is started
      ansible.builtin.service:
        name: postgresql
        state: started

    - name: Check whether the_peoples_edh_bracket postgres role exists
      ansible.builtin.command:
        cmd: >-
          psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ postgres_the_peoples_edh_bracket_user }}';"
      become_user: postgres
      register: the_peoples_edh_bracket_pg_role
      changed_when: false

    - name: Create the_peoples_edh_bracket postgres role
      ansible.builtin.command:
        cmd: >-
          psql -c "CREATE ROLE \"{{ postgres_the_peoples_edh_bracket_user }}\" LOGIN PASSWORD '{{ env.THE_PEOPLES_EDH_BRACKET_DB_PASSWORD | replace("'", "''") }}';"
      become_user: postgres
      no_log: true
      when: the_peoples_edh_bracket_pg_role.stdout | trim != '1'

    - name: Ensure the_peoples_edh_bracket postgres role password is set
      ansible.builtin.command:
        cmd: >-
          psql -c "ALTER ROLE \"{{ postgres_the_peoples_edh_bracket_user }}\" WITH LOGIN PASSWORD '{{ env.THE_PEOPLES_EDH_BRACKET_DB_PASSWORD | replace("'", "''") }}';"
      become_user: postgres
      no_log: true
      changed_when: false

    - name: Check whether the_peoples_edh_bracket postgres database exists
      ansible.builtin.command:
        cmd: >-
          psql -tAc "SELECT 1 FROM pg_database WHERE datname='{{ postgres_the_peoples_edh_bracket_db }}';"
      become_user: postgres
      register: the_peoples_edh_bracket_pg_db
      changed_when: false

    - name: Create the_peoples_edh_bracket postgres database
      ansible.builtin.command:
        cmd: >-
          psql -c "CREATE DATABASE \"{{ postgres_the_peoples_edh_bracket_db }}\" OWNER \"{{ postgres_the_peoples_edh_bracket_user }}\";"
      become_user: postgres
      when: the_peoples_edh_bracket_pg_db.stdout | trim != '1'

    - name: Ensure the_peoples_edh_bracket postgres database owner is correct
      ansible.builtin.command:
        cmd: >-
          psql -c "ALTER DATABASE \"{{ postgres_the_peoples_edh_bracket_db }}\" OWNER TO \"{{ postgres_the_peoples_edh_bracket_user }}\";"
      become_user: postgres
      changed_when: false
