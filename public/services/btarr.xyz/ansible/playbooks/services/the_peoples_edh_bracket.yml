- name: Set up the_peoples_edh_bracket service
  hosts: all
  become: true

  tasks:
    - name: Ensure the_peoples_edh_bracket directory exists
      ansible.builtin.file:
        path: /opt/the_peoples_edh_bracket
        state: directory
        owner: svc
        group: svc
        mode: "0755"

    - name: Set the_peoples_edh_bracket environment variables
      ansible.builtin.lineinfile:
        path: /opt/the_peoples_edh_bracket/.env
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        create: true
        owner: svc
        group: svc
        mode: "0600"
      loop:
        - regexp: "^DATABASE_URL="
          line: "DATABASE_URL=postgresql://the_peoples_edh_bracket:{{ env.THE_PEOPLES_EDH_BRACKET_PG_PASSWORD | urlencode }}@127.0.0.1:5432/the_peoples_edh_bracket"
        - regexp: "^MOXFIELD_USER_AGENT="
          line: "MOXFIELD_USER_AGENT={{ env.THE_PEOPLES_EDH_BRACKET_MOXFIELD_USER_AGENT }}"
      notify: Restart the_peoples_edh_bracket service

    - name: Install the_peoples_edh_bracket systemd unit
      ansible.builtin.copy:
        src: "{{ files }}/the_peoples_edh_bracket.service"
        dest: /etc/systemd/system/the_peoples_edh_bracket.service
        owner: root
        group: root
        mode: "0644"
      notify: the_peoples_edh_bracket unit changed

    - name: Ensure the_peoples_edh_bracket service is enabled
      ansible.builtin.service:
        name: the_peoples_edh_bracket
        enabled: true

    - name: Schedule daily card sync for the_peoples_edh_bracket
      ansible.builtin.cron:
        name: the_peoples_edh_bracket sync cards
        user: svc
        special_time: daily
        job: "[ -x /opt/the_peoples_edh_bracket/bin/the_peoples_edh_bracket ] && cd /opt/the_peoples_edh_bracket && /opt/the_peoples_edh_bracket/bin/the_peoples_edh_bracket sync-cards"

    - name: Check whether the_peoples_edh_bracket binary exists
      ansible.builtin.stat:
        path: /opt/the_peoples_edh_bracket/bin/the_peoples_edh_bracket
      register: binary

    - name: Start the_peoples_edh_bracket service when binary is present
      ansible.builtin.service:
        name: the_peoples_edh_bracket
        state: started
      when: binary.stat.exists

  handlers:
    - name: Reload systemd daemon
      ansible.builtin.systemd_service:
        daemon_reload: true
      listen: the_peoples_edh_bracket unit changed

    - name: Restart the_peoples_edh_bracket service
      ansible.builtin.service:
        name: the_peoples_edh_bracket
        state: restarted
      when: binary.stat.exists
      listen: the_peoples_edh_bracket unit changed
