name: Build 🔨 & Deploy 🚀

on:
  push:
	branches:
      - main
	paths:
	  - "apps/StackTask/**"
  pull_request:
    branches:
      - main
	paths:
	  - "apps/StackTask/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: apps/StackTask

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: |
            - cwd: ./apps/StackTask
              args: [--frozen-lockfile]

      - run: pnpm build
        working-directory: ./apps/StackTask

      - uses: actions/upload-artifact@v4
        with:
          name: StackTaskDist
          path: ./apps/StackTask/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/download-artifact@v4

      - name: Upload new app
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: ./dist/*
          target: /var/www/stacktask.btarr.xyz/
          overwrite: true
          strip_components: 2

      - name: Make executable
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: sudo chmod -R a+rX /var/www/stacktask.btarr.xyz
