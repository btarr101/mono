- name: Set up nginx
  hosts: all
  become: true

  tasks:
    - name: Install nginx and snapd
      ansible.builtin.apt:
        name:
          - nginx
          - snapd
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure snapd service is enabled and running
      ansible.builtin.service:
        name: snapd
        state: started
        enabled: true

    - name: Remove apt certbot to ensure snap certbot is used
      ansible.builtin.apt:
        name: certbot
        state: absent

    - name: Install certbot snap
      ansible.builtin.command: snap install --classic certbot
      args:
        creates: /snap/certbot/current

    - name: Allow certbot to use DNS plugin snaps
      ansible.builtin.command: snap set certbot trust-plugin-with-root=ok
      changed_when: false

    - name: Install certbot DigitalOcean DNS plugin snap
      ansible.builtin.command: snap install certbot-dns-digitalocean
      args:
        creates: /snap/certbot-dns-digitalocean/current

    - name: Connect certbot to DigitalOcean DNS plugin
      ansible.builtin.command: snap connect certbot:plugin certbot-dns-digitalocean
      register: snap_connect
      changed_when: false
      failed_when: snap_connect.rc != 0 and 'already connected' not in (snap_connect.stderr | lower)

    - name: Write DigitalOcean credentials for certbot DNS challenge
      ansible.builtin.copy:
        dest: /root/certbot-creds.ini
        owner: root
        group: root
        mode: "0600"
        content: |
          dns_digitalocean_token = {{ env.DIGITALOCEAN_TOKEN }}

    - name: Request or renew wildcard Let's Encrypt certificate via DNS challenge
      ansible.builtin.command:
        cmd: >-
          /snap/bin/certbot certonly --dns-digitalocean
          --dns-digitalocean-credentials /root/certbot-creds.ini
          --non-interactive --agree-tos --email {{ env.CERTBOT_EMAIL }}
          --cert-name btarr.xyz --keep-until-expiring
          -d *.btarr.xyz
      register: output
      changed_when: "'Certificate not yet due for renewal' not in output.stdout"

    - name: Install certbot deploy hook to reload nginx after renewals
      ansible.builtin.copy:
        dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          systemctl reload nginx

    - name: Ensure snap certbot renew timer is enabled and running
      ansible.builtin.service:
        name: snap.certbot.renew.timer
        state: started
        enabled: true

    - name: Deploy nginx config
      ansible.builtin.copy:
        src: "{{ files }}/nginx.conf"
        dest: /etc/nginx/conf.d/btarr.xyz.conf
        owner: root
        group: root
        mode: "0644"
      notify: nginx config changed

    - name: Ensure nginx is enabled and running
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

  handlers:
    - name: Validate nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false
      listen: nginx config changed

    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
      listen: nginx config changed
