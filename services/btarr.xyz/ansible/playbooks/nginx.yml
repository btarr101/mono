- name: Set up nginx
  hosts: btarr.xyz
  become: true

  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure nginx is enabled and running
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: Deploy nginx virtual host config
      ansible.builtin.copy:
        src: "{{ files }}/nginx.conf"
        dest: /etc/nginx/conf.d/btarr.xyz.conf
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx

    - name: Validate nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
