# Global proxy header configuration
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Global proxy defaults (applied to all proxy_pass directives)
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header Host $host;
proxy_set_header X-Forwarded-Proto $scheme;

# Upstream declarations (optional, for easier load balancing later)
upstream controlmylights_backend {
    server 127.0.0.1:3000;
}

server {
    server_name controlmylights.btarr.xyz;
    listen 80;

    location / {
        proxy_pass http://controlmylights_backend;
    }
}

# Stacktask
server {
    server_name stacktask.btarr.xyz;
    listen 80;

    root /var/www/stacktask.btarr.xyz;
    index index.html;

    location / {
        autoindex off;
        expires off;
        add_header Cache-Control "public, max-age=0, s-maxage=0, must-revalidate" always;	
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2|webmanifest?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, s-maxage=31536000, immutable";
        try_files $uri =404;
    }
}

